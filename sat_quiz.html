<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SAT Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sat_quiz.css">
</head>
<body>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-step" id="step1">
      <h2 class="modal-title">What's your goal?</h2>
      <p class="modal-sub">Enter the % score you want to hit</p>
      <input class="modal-input" id="goalInput" type="number" min="1" max="100" placeholder="e.g. 80">
      <button class="modal-btn" id="toStep2">Next →</button>
    </div>
    <div class="modal-step hidden" id="step2">
      <h2 class="modal-title">Which section?</h2>
      <p class="modal-sub">Choose what to practice</p>
      <div class="modal-section-btns">
        <button class="modal-section-btn" data-section="English">English</button>
        <button class="modal-section-btn" data-section="Math">Math</button>
        <button class="modal-section-btn" data-section="Both">Both</button>
      </div>
      <button class="modal-btn" id="startBtn" disabled>Start Practice →</button>
    </div>
  </div>
</div>

<!-- TOP NAV -->
<nav class="top-nav">
  <a href="index.html" class="site-title">SAT Prep</a>
  <div class="nav-section-pills">
    <button class="subject-btn">English</button>
    <button class="subject-btn">Math</button>
    <button class="subject-btn">Both</button>
  </div>
</nav>

<!-- MAIN CARD -->
<div class="card">

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap" style="display:none;">
    <div class="progress-top">
      <span class="progress-label" id="progressLabel">Goal: —</span>
      <span class="progress-pct" id="progressPct"></span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- QUESTION -->
  <div class="question-area">
    <div class="question-tag" id="questionTag">MATH</div>
    <div class="question-box" id="questionBox">Ready to practice?</div>
  </div>

  <!-- EXPLANATION BANNER -->
  <div class="explanation-banner" id="explanationBanner">
    <div class="explanation-label" id="explanationLabel">Explanation</div>
    <div id="explanationText"></div>
  </div>

  <!-- OPTIONS -->
  <div class="options-col" id="optionsCol">
    <button class="option-btn"><span class="option-letter">A</span><span class="option-text"></span></button>
    <button class="option-btn"><span class="option-letter">B</span><span class="option-text"></span></button>
    <button class="option-btn"><span class="option-letter">C</span><span class="option-text"></span></button>
    <button class="option-btn"><span class="option-letter">D</span><span class="option-text"></span></button>
  </div>

  <!-- TOOL PANELS -->
  <div class="tool-panel" id="englishTools">
    <div class="tool-panel-body">
      <textarea class="notepad-area" id="notepadArea" placeholder="Jot down notes…"></textarea>
      <button class="notepad-clear-btn" id="notepadClearBtn">Clear</button>
    </div>
  </div>

  <div class="tool-panel" id="mathTools">
    <div class="tool-panel-tabs">
      <button class="tool-tab active" id="mathTabWB">✏️ Whiteboard</button>
      <button class="tool-tab" id="mathTabCalc">🧮 Calculator</button>
      <button class="tool-tab" id="mathTabGraph">📈 Graph</button>
    </div>
    <div class="tool-panel-body">
      <div class="math-sub-panel visible" id="panelWhiteboard">
        <div class="whiteboard-wrap">
          <div class="whiteboard-toolbar">
            <button class="wb-tool-btn active" id="wbPenBtn">Pen</button>
            <button class="wb-tool-btn" id="wbEraserBtn">Eraser</button>
            <span class="wb-divider"></span>
            <div class="wb-color-swatch active" data-color="#111111" style="background:#111111;"></div>
            <div class="wb-color-swatch" data-color="#e53935" style="background:#e53935;"></div>
            <div class="wb-color-swatch" data-color="#1e88e5" style="background:#1e88e5;"></div>
            <div class="wb-color-swatch" data-color="#43a047" style="background:#43a047;"></div>
            <span class="wb-divider"></span>
            <input class="wb-size-slider" id="wbSize" type="range" min="1" max="20" value="3">
            <button class="wb-clear-btn" id="wbClearBtn">Clear</button>
          </div>
          <canvas class="wb-canvas" id="wbCanvas"></canvas>
        </div>
      </div>
      <div class="math-sub-panel" id="panelCalc">
        <div class="desmos-wrap" id="desmosCalc"></div>
      </div>
      <div class="math-sub-panel" id="panelGraph">
        <div class="desmos-wrap" id="desmosGraph"></div>
      </div>
    </div>
  </div>

  <!-- AI PANEL -->
  <div class="ai-panel" id="aiPanel">
    <div class="ai-panel-header">
      <span class="ai-panel-title">🤖 AI TUTOR</span>
      <button class="ai-close-btn" id="aiCloseBtn">✕</button>
    </div>
    <div class="ai-panel-body" id="aiPanelBody">
      <p style="color:var(--text-muted);font-size:14px;">Press "Ask AI" to get a step-by-step explanation.</p>
    </div>
  </div>

</div>

<!-- FIXED BOTTOM BAR -->
<div class="bottom-bar">
  <button class="back-btn" id="backBtn">← Back</button>
  <button class="skip-btn" id="skipBtn">Skip</button>
  <button class="ask-ai-btn" id="askAiBtn">🤖 Ask AI</button>
</div>

<script src="https://www.desmos.com/api/v1.9/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
<script src="questions.js"></script>
<script src="sat_quiz.js"></script>
<script src="tracker.js"></script>
</body>
</html>
