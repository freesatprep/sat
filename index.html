<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free SAT Test Prep</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sat_landing.css">
</head>
<body>

<nav class="top-nav">
  <button class="theme-toggle" id="themeToggle" onclick="
    var isDark = document.body.classList.toggle('dark');
    localStorage.setItem('sat_theme', isDark ? 'dark' : 'light');
    this.textContent = isDark ? '☀️ Light' : '🌙 Dark';
  ">🌙 Dark</button>
</nav>
<script>
  (function() {
    var btn = document.getElementById('themeToggle');
    if (localStorage.getItem('sat_theme') === 'dark') {
      document.body.classList.add('dark');
      if (btn) btn.textContent = '☀️ Light';
    }
  })();
</script>

<section class="hero">
  <h1 class="hero-title">
    <span class="line1">Free</span>
    <span class="line2">SAT</span>
    <span class="line3">Test Prep</span>
  </h1>
</section>

<section class="daily">
  <p class="daily-label">Daily SAT Question</p>
  <div class="question-card">
    <div class="question-box" id="questionBox">
      <img id="questionImg" src="" alt="SAT Question" style="width:100%;height:100%;object-fit:contain;display:block;">
    </div>
    <div class="options-col" id="optionsCol">
      <button class="option-btn"></button>
      <button class="option-btn"></button>
      <button class="option-btn"></button>
      <button class="option-btn"></button>
      <button class="dont-know-btn">Don't Know?</button>
    </div>
  </div>
</section>

<button class="practiceMore">Do You Want More Practice?</button>
  
<!-- ── STATS SECTION ── -->
<section class="websites-section">
  <h2 class="photos-title">Site Stats</h2>
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-value" id="s-views">~700</div><div class="stat-label">Total Views</div></div>
    <div class="stat-card"><div class="stat-value" id="s-unique">~300</div><div class="stat-label">Unique Visitors</div></div>
    <div class="stat-card"><div class="stat-value" id="s-answered">~2400</div><div class="stat-label">Questions Answered</div></div>
    <div class="stat-card"><div class="stat-value" id="s-time">~50</div><div class="stat-label">Total Hours Practiced</div></div>
  </div>
</section>

<footer></footer>

<script src="questions.js"></script>
<script src="sat_landing.js"></script>
<script src="tracker.js"></script>
</body>
</html>
